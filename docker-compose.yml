version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: axisallies
      POSTGRES_PASSWORD: axisallies
      POSTGRES_DB: axisallies
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axisallies"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://axisallies:axisallies@postgres:5432/axisallies
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      PORT: 3001
      WEB_URL: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '80:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
